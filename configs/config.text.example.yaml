api:
  alias: gemma-4-local
  api_key: local
  api_key_env: LLAMA_API_KEY
  port: 8080
  metrics: true

model:
  mode: text
  model_url: https://huggingface.co/mradermacher/gemma-4-26B-A4B-Heretic-Stable-i1-GGUF/resolve/main/gemma-4-26B-A4B-Heretic-Stable.i1-Q4_K_M.gguf

runtime:
  profile: balanced
  ctx_size: 8192
  batch_size: 256
  ubatch_size: 64
  gpu_layers: 999
  split_mode: layer
  tensor_split: "1,1"
  threads: 4
  parallel: 1
  warmup: true
  allow_unsafe_context: false

reasoning:
  mode: off
  clean_gemma4_tags: true

download:
  backend: aria2
  hf_token_env: HF_TOKEN
